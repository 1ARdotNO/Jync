# Relax cosmetic markdown rules; keep structural ones.
default: true
MD013: false # line length
MD033: false # inline HTML (centered README header)
MD041: false # first line need not be a heading (README opens with a <div>)
MD040: false # fenced blocks without a language
MD026: false # trailing punctuation in headings
MD036: false # emphasis-as-heading
MD024:
  siblings_only: true # allow repeated heading text under different parents
